<body>
  <h1>
    Car Object
  </h1>
  <p>
    A simple car object that has a <code>speed</code> attribute and a <code>move</code> method.
  </p>
  <p>
    See the console and use the command <code>celta.move("direction")</code> to see the car moving in the coordinates.
    You can create your own instance of a car with any name using the command
    <code>let name = new Car(x, y, speed)</code>.
  </p>
</body>
